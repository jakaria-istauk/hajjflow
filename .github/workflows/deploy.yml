name: Deploy to GitHub Pages

on:
  push:
    branches: master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          # WP vars only needed if cloud sync is enabled; safe to omit for local-only mode
          VITE_WP_URL: ${{ secrets.VITE_WP_URL }}
          VITE_WP_LOGGED_IN_KEY: ${{ secrets.VITE_WP_LOGGED_IN_KEY }}
          VITE_WP_AUTH_SALT: ${{ secrets.VITE_WP_AUTH_SALT }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
